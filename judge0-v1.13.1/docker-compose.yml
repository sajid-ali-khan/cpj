x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: mrkushalsm/judge0:cgv2
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "2358:2358"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    <<: *default-logging
    restart: always

  workers:
    image: mrkushalsm/judge0:cgv2
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  data:
