<!--
  File: dashboard-layout.component.html
  Purpose: Markup for the admin layout containing the navigation sidebar and router outlet.
-->

<div class="admin-container">
  <!-- Navigation Sidebar -->
  <div class="sidebar">
    <div>
      <h3 style="margin: 0; color: var(--text-bright);">CPJ Console</h3>
      <span style="font-size: 11px; color: var(--text-muted); font-weight: bold; text-transform: uppercase;">
        Invigilator Session
      </span>
      
      <ul class="nav-list">
        <li>
          <a routerLink="/admin/overview" routerLinkActive="active">Overview</a>
        </li>
        <li>
          <a routerLink="/admin/contests" routerLinkActive="active">Contest Config</a>
        </li>
        <li>
          <a routerLink="/admin/problems" routerLinkActive="active">Problem Repository</a>
        </li>
        <li>
          <a routerLink="/admin/students" routerLinkActive="active">Student Directory</a>
        </li>
      </ul>
    </div>

    <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px;">
      <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Logged in as</div>
      <div style="font-size: 13px; color: var(--text-bright); font-weight: 600; margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
        {{ adminName }}
      </div>
      <button (click)="logout()" class="btn btn-danger" style="width: 100%; font-size: 12px; padding: 5px 8px;">Log Out</button>
    </div>
  </div>

  <!-- Primary Dashboard Render Area -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
