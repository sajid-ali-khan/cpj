spring.application.name=cpj

# Optional local overrides (gitignored) — copy credentials here
spring.config.import=optional:classpath:application-local.properties

# DataSource — defaults; override in application-local.properties
spring.datasource.url=jdbc:postgresql://localhost:5432/cpj_db
spring.datasource.username=cpj
spring.datasource.password=changeme

# JPA — Flyway owns the schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Safety: never let flyway clean drop the DB accidentally
spring.flyway.clean-disabled=true

# Judge0 — override callback-base-url with your LAN IP in application-local.properties
judge0.base-url=http://localhost:2358
judge0.callback-base-url=http://localhost:8080
# 5s: enough headroom for bits/stdc++.h compilation (~1.5s) + actual run time
judge0.cpu-time-limit=5
judge0.memory-limit-kb=262144
